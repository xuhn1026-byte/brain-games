<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏分类 - 脑力训练</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="logo">
        <span class="emoji">🧠</span>
        <a href="index.html"><span>脑力训练</span></a>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link">首页</a>
        <a href="category.html?type=memory" class="nav-link" data-nav="memory">记忆</a>
        <a href="category.html?type=speed" class="nav-link" data-nav="speed">速度</a>
        <a href="category.html?type=attention" class="nav-link" data-nav="attention">注意力</a>
        <a href="category.html?type=flexibility" class="nav-link" data-nav="flexibility">灵活性</a>
        <a href="dashboard.html" class="nav-link">📊 看板</a>
      </div>
      <div id="user-pill-container"></div>
    </div>
  </nav>

  <!-- 动态内容区 -->
  <div id="page-content">
    <!-- JS 动态渲染：可玩分类的游戏列表 或 占位页面 -->
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <p>脑力训练 - 基于认知神经科学的脑力训练平台</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/core/config.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script>
    // 获取 URL 参数
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }
    
    const type = getParam('type') || 'memory';
    const category = getCategoryById(type);
    
    if (!category) {
      document.getElementById('page-content').innerHTML = `
        <div class="placeholder-section">
          <div class="placeholder-icon">❓</div>
          <h2 class="placeholder-title">分类未找到</h2>
          <p class="placeholder-desc">请返回首页选择正确的认知训练分类</p>
          <a href="index.html" class="btn-primary">返回首页</a>
        </div>
      `;
    } else if (category.status === 'coming_soon') {
      // 占位分类页面
      document.getElementById('page-content').innerHTML = `
        <div class="placeholder-section">
          <div class="placeholder-icon">${category.icon}</div>
          <h2 class="placeholder-title" style="color:${category.color};">${category.name} ${category.nameZh}</h2>
          <p class="placeholder-desc">${category.description}</p>
          <p class="placeholder-desc">该分类的游戏正在开发中，敬请期待！</p>
          <a href="index.html" class="btn-primary" style="background:${category.color};">返回首页</a>
        </div>
      `;
      // 更新页面标题
      document.title = `${category.nameZh} - 即将上线 | 脑力训练`;
    } else {
      // 可玩分类：渲染 Hero + 游戏列表
      document.getElementById('page-content').innerHTML = `
        <div class="game-detail-hero" style="--category-accent: ${category.color};">
          <div style="font-size:48px; margin-bottom:12px;">${category.icon}</div>
          <h1 class="game-name">${category.nameZh}</h1>
          <p class="game-desc">${category.description}</p>
          <span class="game-paradigm">${category.gameCount} 款训练游戏</span>
        </div>
        
        <section class="container game-list-section">
          <div class="game-list-header">
            <div>
              <h2 class="section-title" style="font-size:24px;">训练游戏列表</h2>
              <p class="section-subtitle">每款游戏基于经典心理学范式设计</p>
            </div>
            <a href="index.html" class="back-link">← 返回首页</a>
          </div>
          
          <div class="game-list-grid" id="game-list">
            <!-- 游戏卡片由 JS 渲染 -->
          </div>
        </section>
      `;
      
      // 渲染游戏卡片
      const gameList = document.getElementById('game-list');
      gameList.innerHTML = category.games.map(game => {
        const isActive = game.status === 'active';
        const cardClass = isActive ? 'game-card' : 'game-card coming-soon';
        const btnHtml = isActive 
          ? `<a href="game.html?id=${game.id}" class="btn-primary" style="font-size:13px; padding:6px 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.15);">开始训练</a>`
          : `<span class="btn-disabled" style="font-size:13px; padding:6px 16px;">即将上线</span>`;
        const statusBadge = isActive 
          ? '<span class="game-status-badge active">已上线</span>'
          : '<span class="game-status-badge coming-soon">开发中</span>';
        
        return `
          <div class="${cardClass}">
            <div class="game-cover" style="--game-accent: ${game.coverColor || '#ccc'}; background: ${game.coverColor || '#ccc'};">
              ${game.emoji || '?'}
            </div>
            <div class="game-info">
              <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
                <div class="game-name">${game.name}</div>
                ${statusBadge}
              </div>
              <div class="game-desc">${game.description}</div>
              <div class="game-paradigm">${game.paradigm}</div>
              <div class="game-card-footer">
                ${btnHtml}
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      document.title = `${category.nameZh} | 脑力训练`;
    }
    
    // 高亮当前导航
    document.querySelectorAll('.nav-link[data-nav]').forEach(link => {
      if (link.dataset.nav === type) link.classList.add('active');
    });

    BrainAuth.renderUserPill(document.getElementById('user-pill-container'));
  </script>
</body>
</html>
