<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脑力训练 - 认知训练平台</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="logo">
        <span class="emoji">🧠</span>
        <span>脑力训练</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">首页</a>
        <a href="category.html?type=memory" class="nav-link">记忆</a>
        <a href="category.html?type=speed" class="nav-link">速度</a>
        <a href="category.html?type=attention" class="nav-link">注意力</a>
        <a href="category.html?type=flexibility" class="nav-link">灵活性</a>
        <a href="dashboard.html" class="nav-link">📊 看板</a>
      </div>
      <div id="user-pill-container"></div>
    </div>
  </nav>

  <!-- 欢迎横幅 -->
  <div id="welcome-banner" class="welcome-banner" style="display:none; max-width: 1200px; margin: 20px auto 0;"></div>

  <!-- Hero 区域 -->
  <section class="hero">
    <h1 class="hero-title">训练大脑<br>提升 <span class="highlight">认知能力</span></h1>
    <p class="hero-subtitle">基于认知神经科学设计的脑力训练游戏，帮助提升记忆、注意力与处理速度</p>
    <button class="btn-primary" onclick="scrollToCategories()" style="font-size:16px; padding:12px 32px;">开始训练</button>
    
    <div class="hero-stats">
      <div class="stat-item">
        <span class="stat-number">7</span>
        <span class="stat-label">认知领域</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">3</span>
        <span class="stat-label">已上线</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">∞</span>
        <span class="stat-label">训练潜力</span>
      </div>
    </div>
  </section>

  <!-- 7 分类展示 -->
  <section class="container" id="categories-section">
    <div style="padding-top: 60px;">
      <h2 class="section-title">探索脑力训练分类</h2>
      <p class="section-subtitle">覆盖七大核心认知能力，科学训练您的大脑</p>
    </div>
    
    <div class="category-grid" id="category-grid">
      <!-- JS 动态渲染 -->
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <p>脑力训练 - 基于认知神经科学的脑力训练平台</p>
  </footer>

  <!-- 登录弹窗 -->
  <div id="login-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h2>开始训练</h2>
      <p>请输入姓名和 4 位数字 PIN，系统将自动记录训练数据。</p>
      <div class="form-group">
        <label for="login-name">姓名</label>
        <input type="text" id="login-name" placeholder="例如：张三" maxlength="20">
      </div>
      <div class="form-group">
        <label for="login-pin">PIN 码（4 位数字）</label>
        <input type="password" id="login-pin" placeholder="1234" maxlength="4" inputmode="numeric">
      </div>
      <div class="form-error" id="login-error"></div>
      <div class="form-actions">
        <button class="btn-secondary-modal" type="button" onclick="BrainAuth.hideLoginModal()">取消</button>
        <button class="btn-primary-modal" type="button" onclick="handleLogin()">开始训练</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/core/config.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script>
    // 渲染 7 分类卡片
    function renderCategories() {
      const grid = document.getElementById('category-grid');
      const categories = getAllCategories();
      
      grid.innerHTML = categories.map(cat => {
        const isActive = cat.status === 'active';
        const cardClass = isActive ? 'category-card active' : 'category-card coming-soon';
        const metaHtml = isActive 
         ? `<span class="game-count">${cat.gameCount} 款游戏</span><span style="--cat-color: ${cat.color}; color: var(--cat-color, #0D7377); font-weight:600; font-size:14px;">去训练 →</span>`
          : `<span class="badge-coming-soon">即将上线</span>`;
        const cardTag = isActive ? `<a href="category.html?type=${cat.id}" style="display:block; color:inherit;">` : '<div>';
        const cardEndTag = isActive ? '</a>' : '</div>';
        
        return `
          ${cardTag}
          <div class="${cardClass}">
            <div class="category-icon" style="--card-accent-bg: ${cat.lightColor};">${cat.icon}</div>
            <div class="category-name" style="--card-accent: ${cat.color};">${cat.name}</div>
            <div class="category-name-zh">${cat.nameZh}</div>
            <div class="category-desc">${cat.description}</div>
            <div class="category-meta">
              ${metaHtml}
            </div>
          </div>
          ${cardEndTag}
        `;
      }).join('');
    }
    
    function scrollToCategories() {
      document.getElementById('categories-section').scrollIntoView({ behavior: 'smooth' });
    }

    async function handleLogin() {
      const name = document.getElementById('login-name').value.trim();
      const pin = document.getElementById('login-pin').value.trim();
      const errorEl = document.getElementById('login-error');
      errorEl.textContent = '';

      if (!name) {
        errorEl.textContent = '请输入姓名';
        return;
      }
      if (!/^\d{4}$/.test(pin)) {
        errorEl.textContent = 'PIN 必须是 4 位数字';
        return;
      }

      try {
        await BrainAuth.login(name, pin);
        initPage();
        BrainAuth.hideLoginModal();
      } catch (err) {
        errorEl.textContent = err.message || '登录失败';
      }
    }

    function initPage() {
      BrainAuth.renderUserPill(document.getElementById('user-pill-container'));
      const user = BrainAuth.getUser();
      const banner = document.getElementById('welcome-banner');
      if (user && banner) {
        banner.textContent = `欢迎回来，${user.name}！请选择下面的训练项目。`;
        banner.style.display = 'block';
      }
      renderCategories();
    }

    document.getElementById('login-pin').addEventListener('input', function(e) {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
    });

    document.getElementById('login-pin').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    initPage();
    if (!BrainAuth.isLoggedIn()) {
      BrainAuth.showLoginModal();
    }
  </script>
</body>
</html>
